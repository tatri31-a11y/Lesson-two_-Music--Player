<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titanium Dawn — Музыкальный плеер</title>
  <style>
    /* ===== CSS-переменные для светлой и тёмной темы ===== */
    :root {
      --bg-gradient-1: #667eea;
      --bg-gradient-2: #764ba2;
      --card-bg: rgba(255, 255, 255, 0.12);
      --card-border: rgba(255, 255, 255, 0.2);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.75);
      --text-muted: rgba(255, 255, 255, 0.55);
      --accent: #1db954;
      --accent-hover: #1ed760;
      --progress-bg: rgba(255, 255, 255, 0.25);
      --progress-fill: #ffffff;
      --btn-bg: rgba(255, 255, 255, 0.15);
      --btn-hover: rgba(255, 255, 255, 0.28);
      --shadow: 0 25px 50px rgba(0, 0, 0, 0.35);
      --cover-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
    }

    body.theme-dark {
      --bg-gradient-1: #0f0c29;
      --bg-gradient-2: #302b63;
      --card-bg: rgba(0, 0, 0, 0.35);
      --card-border: rgba(255, 255, 255, 0.08);
      --shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
    }

    body.theme-light {
      --bg-gradient-1: #f5f7fa;
      --bg-gradient-2: #c3cfe2;
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(0, 0, 0, 0.08);
      --text-primary: #1a1a2e;
      --text-secondary: rgba(26, 26, 46, 0.75);
      --text-muted: rgba(26, 26, 46, 0.5);
      --progress-bg: rgba(0, 0, 0, 0.12);
      --progress-fill: #1db954;
      --btn-bg: rgba(0, 0, 0, 0.06);
      --btn-hover: rgba(0, 0, 0, 0.12);
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
      --cover-shadow: 0 16px 32px rgba(0, 0, 0, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
      color: var(--text-primary);
      padding: 24px 16px;
      transition: background 0.5s ease, color 0.3s ease;
    }

    .player {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 32px 28px 28px;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease;
    }

    .player:hover {
      transform: translateY(-2px);
    }

    .player-header {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    .theme-toggle {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: var(--btn-bg);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      transition: background 0.25s ease, transform 0.2s ease;
    }

    .theme-toggle:hover {
      background: var(--btn-hover);
      transform: scale(1.08);
    }

    .theme-toggle:active {
      transform: scale(0.95);
    }

    .cover-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      margin: 0 auto 28px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--cover-shadow);
    }

    .cover-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .player.is-playing .cover-wrapper img {
      transform: scale(1.03);
    }

    .cover-wrapper::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.25), transparent 50%);
      pointer-events: none;
    }

    .track-info {
      text-align: center;
      margin-bottom: 24px;
    }

    .track-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .track-artist {
      font-size: 0.95rem;
      color: var(--text-secondary);
    }

    .progress-section {
      margin-bottom: 24px;
    }

    .progress-bar {
      position: relative;
      width: 100%;
      height: 6px;
      background: var(--progress-bg);
      border-radius: 999px;
      cursor: pointer;
      margin-bottom: 10px;
      overflow: hidden;
      transition: height 0.2s ease;
    }

    .progress-bar:hover {
      height: 8px;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: var(--progress-fill);
      border-radius: 999px;
      pointer-events: none;
      transition: width 0.1s linear;
    }

    .progress-thumb {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 14px;
      height: 14px;
      background: var(--progress-fill);
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0);
      transition: transform 0.2s ease;
      pointer-events: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .progress-bar:hover .progress-thumb {
      transform: translate(-50%, -50%) scale(1);
    }

    .time-display {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-variant-numeric: tabular-nums;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    .control-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 50%;
      background: var(--btn-bg);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s ease, transform 0.2s ease;
    }

    .control-btn:hover:not(:disabled) {
      background: var(--btn-hover);
      transform: scale(1.08);
    }

    .control-btn:active:not(:disabled) {
      transform: scale(0.94);
    }

    .play-btn {
      width: 64px;
      height: 64px;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 24px rgba(29, 185, 84, 0.4);
    }

    .play-btn:hover:not(:disabled) {
      background: var(--accent-hover);
      box-shadow: 0 10px 28px rgba(29, 185, 84, 0.5);
    }

    .play-btn svg,
    .control-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .play-btn svg {
      width: 28px;
      height: 28px;
    }

    .volume-section {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .volume-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
    }

    .volume-btn svg {
      width: 20px;
      height: 20px;
    }

    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: var(--progress-bg);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--progress-fill);
      border-radius: 50%;
      cursor: pointer;
    }

    .volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--progress-fill);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .player {
        padding: 24px 20px 22px;
        border-radius: 20px;
      }

      .track-title {
        font-size: 1.25rem;
      }

      .play-btn {
        width: 58px;
        height: 58px;
      }
    }

    #audio {
      display: none;
    }
  </style>
</head>
<body class="theme-dark">

  <div class="player" id="player">
    <div class="player-header">
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Переключить тему">
        <span id="themeIcon">🌙</span>
      </button>
    </div>

    <div class="cover-wrapper">
      <!-- ВАЖНО: файл обложки должен называться точно cover.jpeg и лежать рядом с index.html -->
      <img id="coverImage" src="./cover.jpeg" alt="Обложка — Titanium Dawn">
    </div>

    <div class="track-info">
      <h1 class="track-title">Titanium Dawn</h1>
      <p class="track-artist">Ваш трек</p>
    </div>

    <div class="progress-section">
      <div class="progress-bar" id="progressBar" role="slider" aria-label="Прогресс" tabindex="0">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
      <div class="time-display">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" id="rewindBtn" type="button" aria-label="Назад 10 сек" title="−10 сек">
        <svg viewBox="0 0 24 24"><path d="M11.99 5V1l-5 5 5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>

      <button class="play-btn control-btn" id="playBtn" type="button" aria-label="Воспроизвести">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>

      <button class="control-btn" id="forwardBtn" type="button" aria-label="Вперёд 10 сек" title="+10 сек">
        <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg>
      </button>
    </div>

    <div class="volume-section">
      <button class="control-btn volume-btn" id="muteBtn" type="button" aria-label="Звук">
        <svg id="volumeIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg id="muteIcon" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </button>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" aria-label="Громкость">
    </div>
  </div>

  <!-- ВАЖНО: аудиофайл должен называться точно music.mp3 и лежать рядом с index.html -->
  <audio id="audio" preload="auto" src="./music.mp3"></audio>

  <script>
    const audio = document.getElementById("audio");
    const coverImage = document.getElementById("coverImage");
    const player = document.getElementById("player");
    const playBtn = document.getElementById("playBtn");
    const playIcon = document.getElementById("playIcon");
    const pauseIcon = document.getElementById("pauseIcon");
    const progressBar = document.getElementById("progressBar");
    const progressFill = document.getElementById("progressFill");
    const progressThumb = document.getElementById("progressThumb");
    const currentTimeEl = document.getElementById("currentTime");
    const durationEl = document.getElementById("duration");
    const volumeSlider = document.getElementById("volumeSlider");
    const muteBtn = document.getElementById("muteBtn");
    const volumeIcon = document.getElementById("volumeIcon");
    const muteIcon = document.getElementById("muteIcon");
    const themeToggle = document.getElementById("themeToggle");
    const themeIcon = document.getElementById("themeIcon");

    let volumeBeforeMute = 0.8;
    let isSeeking = false;

    function formatTime(seconds) {
      if (!isFinite(seconds)) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return mins + ":" + String(secs).padStart(2, "0");
    }

    function updateProgress() {
      if (isSeeking || !audio.duration) return;
      const percent = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = percent + "%";
      progressThumb.style.left = percent + "%";
      currentTimeEl.textContent = formatTime(audio.currentTime);
    }

    function togglePlay() {
      audio.paused ? audio.play() : audio.pause();
    }

    function updatePlayState() {
      const isPlaying = !audio.paused;
      playIcon.style.display = isPlaying ? "none" : "block";
      pauseIcon.style.display = isPlaying ? "block" : "none";
      player.classList.toggle("is-playing", isPlaying);
    }

    function skip(seconds) {
      audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + seconds));
      updateProgress();
    }

    function seekTo(clientX) {
      const rect = progressBar.getBoundingClientRect();
      const percent = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      audio.currentTime = percent * audio.duration;
      updateProgress();
    }

    function setVolume(value) {
      const vol = Math.max(0, Math.min(1, value / 100));
      audio.volume = vol;
      volumeSlider.value = vol * 100;
      const isMuted = vol === 0;
      volumeIcon.style.display = isMuted ? "none" : "block";
      muteIcon.style.display = isMuted ? "block" : "none";
    }

    function toggleMute() {
      if (audio.volume > 0) {
        volumeBeforeMute = audio.volume;
        setVolume(0);
      } else {
        setVolume(volumeBeforeMute * 100);
      }
    }

    function toggleTheme() {
      const isDark = document.body.classList.contains("theme-dark");
      document.body.classList.replace(isDark ? "theme-dark" : "theme-light", isDark ? "theme-light" : "theme-dark");
      themeIcon.textContent = isDark ? "☀️" : "🌙";
      localStorage.setItem("playerTheme", isDark ? "light" : "dark");
    }

    function loadTheme() {
      const saved = localStorage.getItem("playerTheme") || "dark";
      document.body.classList.add(saved === "light" ? "theme-light" : "theme-dark");
      themeIcon.textContent = saved === "light" ? "☀️" : "🌙";
    }

    audio.addEventListener("loadedmetadata", () => durationEl.textContent = formatTime(audio.duration));
    audio.addEventListener("timeupdate", updateProgress);
    audio.addEventListener("play", updatePlayState);
    audio.addEventListener("pause", updatePlayState);
    audio.addEventListener("ended", () => { audio.currentTime = 0; updateProgress(); updatePlayState(); });

    playBtn.addEventListener("click", togglePlay);
    document.getElementById("rewindBtn").addEventListener("click", () => skip(-10));
    document.getElementById("forwardBtn").addEventListener("click", () => skip(10));
    muteBtn.addEventListener("click", toggleMute);
    themeToggle.addEventListener("click", toggleTheme);
    volumeSlider.addEventListener("input", () => setVolume(Number(volumeSlider.value)));

    progressBar.addEventListener("click", (e) => seekTo(e.clientX));
    progressBar.addEventListener("mousedown", (e) => { isSeeking = true; seekTo(e.clientX); });
    document.addEventListener("mousemove", (e) => { if (isSeeking) seekTo(e.clientX); });
    document.addEventListener("mouseup", () => { isSeeking = false; });

    progressBar.addEventListener("touchstart", (e) => { isSeeking = true; seekTo(e.touches[0].clientX); }, { passive: true });
    progressBar.addEventListener("touchmove", (e) => { if (isSeeking) seekTo(e.touches[0].clientX); }, { passive: true });
    progressBar.addEventListener("touchend", () => { isSeeking = false; });

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" && e.target === document.body) { e.preventDefault(); togglePlay(); }
      if (e.code === "ArrowLeft") skip(-10);
      if (e.code === "ArrowRight") skip(10);
    });

    /* Проверка: загрузились ли обложка и трек */
    coverImage.addEventListener("error", function () {
      document.querySelector(".track-artist").textContent =
        "Обложка не найдена — нужен файл cover.jpeg рядом с index.html";
    });

    audio.addEventListener("error", function () {
      document.querySelector(".track-artist").textContent =
        "Трек не загрузился — нужен файл music.mp3 рядом с index.html";
      playBtn.disabled = true;
    });

    audio.addEventListener("canplaythrough", function () {
      document.querySelector(".track-artist").textContent = "Ваш трек";
    });

    loadTheme();
    setVolume(80);
    updatePlayState();
    audio.load();
  </script>
</body>
</html>
